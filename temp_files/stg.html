  <script>
    function loadImportMap(env, opco) {
      return new Promise( (resolve, reject) => {
          const importMapUrl = `/core/routes/${opco}/${env}-import-map.json`;
          fetch(importMapUrl).then(response => response.json()).then(data => {
              const script = document.createElement('script');
              script.type = 'systemjs-importmap';
              script.text = JSON.stringify(data);
              document.head.appendChild(script);
              resolve();
            }
          ).catch(error => {
              console.error(`Error loading import map for ${opco}-${env}:`, error);
              reject();
            }
          );
        }
      );
    }
    loadImportMap('stg', 'bgc').then( () => {
        System.import('@avangrid/root-config');
      }
    ).catch(err => {
        console.log('Error while loading OPCO data: stg bgc', err);
      }
    );
  </script>
